a Mecánica", "Operações & Planejamento": "Operaciones & Planificación", "Operações &amp; Planejamento": "Operaciones &amp; Planificación", "Business Intelligence": "Business Intelligence", "Automação &amp; Sistemas": "Automatización &amp; Sistemas", "RH &amp; Remuneração": "RR.HH. &amp; Remuneración", "Metodologias": "Metodologías", "Profissional multidisciplinar em <strong>gestão de operações, planejamento e Business Intelligence</strong> com mais de 9 anos em grandes grupos de saúde e bens de consumo. Atuação estratégica em <strong>governança de indicadores, automação de processos, orçamento de RH e modelagem de força de trabalho</strong>, conectando dados a decisões em operações de alta escala. Engenheiro mecânico com forte perfil analítico e de construção de ferramentas próprias.": "Profesional multidisciplinario en <strong>gestión de operaciones, planificación y Business Intelligence</strong> con más de 9 años en grandes grupos de salud y bienes de consumo. Actuación estratégica en <strong>gobernanza de indicadores, automatización de procesos, presupuesto de RR.HH. y modelado de fuerza laboral</strong>, conectando datos con decisiones en operaciones de alta escala. Ingeniero mecánico con fuerte perfil analítico y de construcción de herramientas propias.", "Atuação conectando operação e estratégia. Atualmente <strong>Gerente de Operações na Amil (Rede Total Care)</strong>, liderando frentes de Telemedicina, Central de Agendas, Captação e equipes cirúrgicas, com governança de indicadores e automação de controles para mais de <strong>1.000 médicos</strong>. Passagem por <strong>Coca-Cola FEMSA</strong> (Informações de RH e Remuneração Variável), <strong>Alliança Saúde / Grupo Dasa</strong> (Planejamento e Performance). Forte em <strong>Power BI, Excel/VBA, Power Query</strong> e desenvolvimento de sistemas próprios em HTML para orçamento, simuladores e dashboards.": "Actuación conectando operación y estrategia. Actualmente <strong>Gerente de Operaciones en Amil (Red Total Care)</strong>, liderando Telemedicina, Central de Agendas, Captación y equipos quirúrgicos, con gobernanza de indicadores y automatización de controles para más de <strong>1.000 médicos</strong>. Experiencia en <strong>Coca-Cola FEMSA</strong> (Información de RR.HH. y Remuneración Variable), <strong>Alliança Saúde / Grupo Dasa</strong> (Planificación y Performance). Fuerte en <strong>Power BI, Excel/VBA, Power Query</strong> y desarrollo de sistemas propios en HTML para presupuesto, simuladores y dashboards.", "Sou um profissional <strong>multidisciplinar e orientado a resultado</strong>, que enxerga a operação como uma engrenagem — da base à decisão estratégica. Construí minha trajetória conectando áreas técnicas, operacionais, financeiras e de RH, sempre traduzindo a complexidade dos números em decisões mais inteligentes.": "Soy un profesional <strong>multidisciplinario y orientado a resultados</strong> que ve la operación como un engranaje — desde la base hasta la decisión estratégica. Construí mi trayectoria conectando áreas técnicas, operativas, financieras y de RR.HH., siempre traduciendo la complejidad de los números en decisiones más inteligentes.", "Gosto de processos que funcionam, mas <strong>não me apego ao “sempre foi assim”</strong>: muitos dos meus melhores resultados nasceram de questionar uma rotina lenta e reconstruí-la — frequentemente com ferramentas próprias que desenvolvo em Excel/VBA, Power BI ou HTML.": "Me gustan los procesos que funcionan, pero <strong>no me apego al “siempre fue así”</strong>: muchos de mis mejores resultados nacieron de cuestionar una rutina lenta y reconstruirla — frecuentemente con herramientas propias en Excel/VBA, Power BI o HTML.", "Trabalho bem em <strong>ambientes que exigem ritmo, governança e múltiplos stakeholders</strong>. Operação, pra mim, não é só manter tudo girando — é fazer girar melhor, com menos ruído e mais resultado.": "Trabajo bien en <strong>entornos que exigen ritmo, gobernanza y múltiple <style>
:root{
  --accent:#1E5CDB;

  --ink:#0F1B2D;
  --bg:#F4F6FB;

  --font:'Inter',-apple-system,Segoe UI,Roboto,sans-serif;
  --text1:#0F1B2D; --text2:#3A4759; --text3:#6B7891; --line:#E4E9F2;
  --radius:16px; --shadow:0 1px 3px rgba(16,27,45,.06),0 8px 24px rgba(16,27,45,.05);
  --sidebar-w:300px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text1);line-height:1.55;-webkit-font-smoothing:antialiased}
em{font-style:normal;color:var(--accent)}
strong{font-weight:600;color:var(--text1)}
a{color:inherit;text-decoration:none}
svg{display:block}

/* layout */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--ink);color:#fff;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;padding:24px 18px;overflow-y:auto;z-index:40}
.main{margin-left:var(--sidebar-w);flex:1;min-width:0;padding:34px clamp(24px,4vw,64px) 90px}
.main-inner{max-width:1160px;margin:0 auto}

/* sidebar head */
.sb-top{display:flex;align-items:center;gap:13px;margin-bottom:22px}
.sb-photo{width:54px;height:54px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.85);box-shadow:0 2px 8px rgba(0,0,0,.18)}
.sb-name{font-weight:700;font-size:16px;letter-spacing:-.2px}
.sb-role{font-size:11.5px;color:#8FA0C0;text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-top:2px}
.lang-dd{position:relative;margin-bottom:20px}
.lang-current{display:flex;align-items:center;gap:10px;width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:11px;padding:10px 13px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;transition:.15s}
.lang-current:hover{background:rgba(255,255,255,.12)}
.lang-current .flag{font-size:18px;line-height:1}
.lang-current .lc-name{flex:1;text-align:left}
.lang-current .lc-chev{transition:transform .2s;color:#8FA0C0}
.lang-dd.open .lc-chev{transform:rotate(180deg)}
.lang-menu{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#16243A;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:6px;box-shadow:0 12px 32px rgba(0,0,0,.35);opacity:0;visibility:hidden;transform:translateY(-6px);transition:.18s;z-index:30}
.lang-dd.open .lang-menu{opacity:1;visibility:visible;transform:none}
.lang-opt{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:#cdd6ea;border-radius:8px;padding:9px 11px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:.12s}
.lang-opt:hover{background:rgba(255,255,255,.07);color:#fff}
.lang-opt.active{background:rgba(30,92,219,.18);color:#fff}
.lang-opt .flag{font-size:17px}
.lang-opt .lo-name{flex:1;text-align:left}
.lang-opt .lo-check{opacity:0;color:var(--accent)}
.lang-opt.active .lo-check{opacity:1}
.lang-opt .lo-check svg{width:15px;height:15px}

/* nav */
.nav-group{margin-bottom:4px}
.nav-head{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;cursor:pointer;font-weight:600;font-size:14px;color:#cdd6ea;transition:.15s;position:relative}
.nav-head:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-head.active{background:rgba(30,92,219,.16);color:#fff}
.nav-head.active::before{content:"";position:absolute;left:-18px;top:50%;transform:translateY(-50%);width:4px;height:20px;border-radius:0 4px 4px 0;background:var(--accent)}
.nav-head svg{flex-shrink:0}
.nav-sub{padding-left:16px;overflow:hidden;max-height:0;transition:max-height .28s ease}
.nav-group.open .nav-sub{max-height:520px}
/* subitem de empresa: logo + nome + período */
.nav-item-emp{padding:7px 11px}
.nav-item-emp::before{display:none}
.nav-emp-logo{width:26px;height:26px;border-radius:7px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.nav-emp-logo img{max-width:80%;max-height:64%;object-fit:contain}
.nav-emp-txt{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.nav-emp-name{font-size:12.5px;font-weight:600;color:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-emp-period{font-size:10px;color:#7C8AA8;font-family:'JetBrains Mono',monospace}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 13px;border-radius:9px;cursor:pointer;font-size:13px;color:#9fb0cf;transition:.15s;position:relative}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.75}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item:hover svg{opacity:1}
.nav-item.active{color:#fff}
.nav-item.active svg{opacity:1;color:var(--accent)}
.nav-chev{margin-left:auto;transition:transform .2s}
.nav-group.open .nav-chev{transform:rotate(180deg)}

.sb-foot{margin-top:auto;padding-top:18px}
.sb-foot-icons{display:flex;gap:8px;margin-bottom:12px}
.sb-foot-ico{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;color:#cdd6ea;transition:.15s}
.sb-foot-ico:hover{background:var(--accent);color:#fff}
.sb-foot-ico svg{width:17px;height:17px}
.sb-foot-txt{font-size:11px;color:#6B7891}

/* pages */
.page{display:none;animation:fade .3s}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent)}
.page-title{font-size:34px;font-weight:700;letter-spacing:-1px;margin:6px 0 8px}
.page-sub{color:var(--text3);font-size:15px;margin-bottom:26px}
.sec-divider{height:1px;background:var(--line);margin:24px 0}

/* hero */
.hero{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:30px;display:flex;gap:28px;margin-bottom:22px}
.hero-id{min-width:0}
.hero-photo{width:188px;height:188px;border-radius:14px;object-fit:cover;flex-shrink:0;border:4px solid #fff;box-shadow:0 8px 24px rgba(16,27,45,.14)}
.hero-eyebrow{display:inline-flex;align-items:center;gap:7px;background:rgba(30,92,219,.08);color:var(--accent);font-size:12px;font-weight:600;padding:5px 12px;border-radius:99px}
.pulse{width:7px;height:7px;border-radius:50%;background:#22C55E;box-shadow:0 0 0 0 rgba(34,197,94,.5);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
.hero-name{font-size:38px;font-weight:700;letter-spacing:-1.2px;margin:12px 0 6px}
.hero-name em{color:var(--accent);font-style:normal}
.hero-fullname{font-size:13px;color:var(--text3);font-weight:500;margin:-2px 0 8px;letter-spacing:.2px}
.hero-role{font-size:16px;color:var(--text2);font-weight:500;display:flex;gap:8px;flex-wrap:wrap}
.hero-role .sep{color:var(--text3)}
.hero-crea{font-size:12px;color:var(--accent);font-weight:600;background:rgba(30,92,219,.08);padding:2px 9px;border-radius:99px}
.hero-desc{margin:16px 0 0;color:var(--text2);font-size:14.5px;line-height:1.7;text-align:justify;text-justify:inter-word}
.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:10px;padding:8px 13px;font-size:13px;font-weight:500;color:var(--text2);background:#fff;cursor:pointer;transition:.15s;font-family:inherit}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip svg{width:15px;height:15px}
.chip-wa{background:#25D366;border-color:#25D366;color:#fff}
.chip-wa:hover{background:#1da851;color:#fff}
.chip-pdf{background:var(--ink);border-color:var(--ink);color:#fff}
.chip-pdf:hover{background:#000;color:#fff}
/* modal de PDF */
.modal{position:fixed;inset:0;background:rgba(15,27,45,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:90;padding:24px}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:18px;max-width:480px;width:100%;padding:30px;position:relative;box-shadow:0 24px 64px rgba(0,0,0,.3)}
.modal-close{position:absolute;top:16px;right:16px;width:34px;height:34px;border:none;background:#F1F4FA;border-radius:9px;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close svg{width:16px;height:16px}
.modal-ico{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 20px rgba(30,92,219,.3)}
.modal-title{font-size:21px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.modal-sub{font-size:13.5px;color:var(--text3);margin-bottom:20px}
.modal-btn{display:flex;align-items:center;gap:14px;width:100%;border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;background:#fff;transition:.15s;text-align:left;font-family:inherit;margin-bottom:11px}
.modal-btn:hover{border-color:var(--accent);background:rgba(30,92,219,.03);transform:translateY(-1px)}
.modal-btn-ico{width:44px;height:44px;border-radius:11px;background:rgba(30,92,219,.08);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-btn-ico-dark{background:var(--ink);color:#fff}
.modal-btn-body{flex:1;min-width:0}
.modal-btn-tt{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.modal-tag{font-size:9.5px;font-weight:700;letter-spacing:.5px;background:rgba(30,92,219,.12);color:var(--accent);padding:2px 7px;border-radius:5px}
.modal-tag-dark{background:var(--ink);color:#fff}
.modal-btn-ds{font-size:12px;color:var(--text3);margin-top:3px;display:block;line-height:1.4}
.modal-btn-arrow{color:var(--text3);flex-shrink:0}
.modal-btn:hover .modal-btn-arrow{color:var(--accent)}
.modal-note{font-size:11.5px;color:var(--text3);margin-top:10px;display:flex;gap:7px;align-items:flex-start}
.modal-note svg{width:15px;height:15px;flex-shrink:0;margin-top:1px;color:var(--accent)}

/* card */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px;margin-bottom:20px}
.card-title{font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);margin-bottom:12px}

/* exec summary */
.exec{color:var(--text2);font-size:14.5px;line-height:1.7;text-align:justify;text-justify:inter-word}
.exec + .exec{margin-top:13px}

/* CTA de contato */
.cta-card{background:linear-gradient(135deg,#1E3A6B 0%,#2C5BA8 100%);border:none;color:#fff}
.cta-head{margin-bottom:18px}
.cta-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:5px}
.cta-sub{font-size:13.5px;color:#CDD9EE;line-height:1.5;max-width:520px}
.cta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.cta-btn{display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:13px;padding:14px 16px;text-decoration:none;transition:.18s}
.cta-btn:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.35);transform:translateY(-1px)}
.cta-ic{display:inline-flex;width:38px;height:38px;flex-shrink:0;align-items:center;justify-content:center;border-radius:10px;background:rgba(255,255,255,.15)}
.cta-ic svg{width:19px;height:19px;color:#fff}
.cta-txt{display:flex;flex-direction:column;min-width:0}
.cta-l{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#B6C9E8}
.cta-v{font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cta-wa:hover{border-color:#25D366}.cta-wa .cta-ic{background:rgba(37,211,102,.2)}
.cta-mail:hover{border-color:#EA4335}.cta-mail .cta-ic{background:rgba(234,67,53,.2)}
.cta-li:hover{border-color:#0A66C2}.cta-li .cta-ic{background:rgba(10,102,194,.25)}
.cta-loc:hover{border-color:#34A853}.cta-loc .cta-ic{background:rgba(52,168,83,.2)}
.cta-pdf{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;background:#fff;color:var(--ink);border:none;border-radius:12px;padding:14px;font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.cta-pdf:hover{background:#EAF0FB}
.cta-pdf svg{width:18px;height:18px}
@media(max-width:560px){.cta-grid{grid-template-columns:1fr}}

/* impacto consolidado */
.impact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.impact-card{border:1px solid var(--line);border-radius:13px;padding:18px;background:#fff;position:relative;overflow:hidden}
.impact-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.impact-ico{width:38px;height:38px;border-radius:10px;background:rgba(30,92,219,.08);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.impact-val{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1}
.impact-val .unit{font-size:14px;font-weight:600;color:var(--text3);margin-left:3px}
.impact-label{font-size:13px;font-weight:600;color:var(--text2);margin-top:6px}
.impact-desc{font-size:11.5px;color:var(--text3);margin-top:3px;line-height:1.35}

/* trajectory */
.traj-item{display:flex;align-items:center;gap:14px;padding:14px 8px;border-bottom:1px solid var(--line);cursor:pointer;transition:.15s}
.traj-item:last-child{border-bottom:none}
.traj-item:hover{padding-left:14px}
.traj-logo{width:46px;height:46px;border-radius:11px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.traj-logo img{max-width:78%;max-height:64%;object-fit:contain}
.traj-info{flex:1;min-width:0}
.traj-name{font-weight:600;font-size:15px}
.traj-role{font-size:12.5px;color:var(--text3)}
.traj-period{font-size:12.5px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.traj-arrow{width:30px;height:30px;border-radius:9px;background:rgba(30,92,219,.08);color:var(--accent);display:flex;align-items:center;justify-content:center;transition:.2s}
.traj-item:hover .traj-arrow{background:var(--accent);color:#fff;transform:translateX(3px)}

/* company cards */
.company{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;border-top:3px solid var(--emp)}
/* toolbar empresas */
.emp-toolbar{display:flex;justify-content:flex-end;margin-bottom:16px}
.emp-toggle-all,.emp-top{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 15px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;transition:.15s}
.emp-toggle-all:hover,.emp-top:hover{border-color:var(--accent);color:var(--accent);background:rgba(30,92,219,.04)}
.emp-toggle-all svg{transition:transform .2s}
.emp-top{margin:6px auto 0;display:flex}
.company-actions{display:flex;justify-content:flex-end;margin:14px 0 4px}
.btn-proj{display:inline-flex;align-items:center;gap:8px;background:var(--emp);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;box-shadow:0 2px 8px color-mix(in srgb,var(--emp) 30%,transparent)}
.btn-proj:hover{filter:brightness(1.08);transform:translateY(-1px)}
.company-head{display:grid;grid-template-columns:auto 1fr auto auto;gap:18px;align-items:center;padding:22px 26px;cursor:pointer;border-bottom:1px solid transparent}
.company:not(.collapsed) .company-head{border-bottom-color:var(--line)}
.company-logo{width:62px;height:62px;border-radius:13px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden}
.company-logo img{max-width:76%;max-height:62%;object-fit:contain}
.company-name{font-size:21px;font-weight:700;letter-spacing:-.4px}
.company-name span{color:var(--text3);font-weight:400;font-size:16px}
.company-role{font-size:13.5px;color:var(--text2);margin-top:2px}
.company-period{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:3px}
.badge{display:inline-block;background:rgba(34,197,94,.12);color:#15803D;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;margin-left:8px;vertical-align:middle}
.company-logo{align-self:center}
.company-head>div:nth-child(2){align-self:center}
.dests{display:flex;gap:20px;padding-left:22px;border-left:1px solid var(--line);align-items:flex-start;height:72px}
.company-chev{align-self:center}
.dest{display:flex;gap:9px;align-items:flex-start;width:152px}
.dest-ico{width:34px;height:34px;border-radius:9px;background:color-mix(in srgb,var(--emp) 12%,#fff);color:var(--emp);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dest-label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3)}
.dest-val{font-size:12px;font-weight:600;color:var(--text2);line-height:1.3}
.company-chev{color:var(--text3);transition:transform .25s}
.company.collapsed .company-chev{transform:rotate(-90deg)}
.company-body{padding:20px 26px 24px;max-height:1600px;overflow:hidden;transition:max-height .3s,padding .3s}
.company.collapsed .company-body{max-height:0;padding-top:0;padding-bottom:0}
.company-resumo{background:color-mix(in srgb,var(--emp) 5%,#fff);border-left:3px solid var(--emp);padding:14px 16px;border-radius:0 10px 10px 0;color:var(--text2);font-size:14px;margin-bottom:16px}
.deliv-title{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.deliv-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.deliv-list li{position:relative;padding-left:20px;font-size:13.5px;color:var(--text2)}
.deliv-list li:before{content:"";position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;background:var(--emp)}
.tools-row{display:flex;flex-wrap:wrap;gap:9px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
.tool-chip{display:inline-flex;align-items:center;gap:7px;background:#F6F8FC;border:1px solid var(--line);border-radius:9px;padding:6px 11px;font-size:12.5px;font-weight:500;color:var(--text2)}
.tool-chip svg{width:17px;height:17px}

/* tools section big */
.tools-grid{display:flex;flex-wrap:wrap;gap:12px}
.tool-big{display:inline-flex;align-items:center;gap:9px;background:#F6F8FC;border:1px solid var(--line);border-radius:11px;padding:10px 16px;font-size:14px;font-weight:600;color:var(--text2)}
.tool-big svg{width:22px;height:22px}
.tools-primary .tool-big{background:#fff;border-color:rgba(30,92,219,.22);box-shadow:0 2px 8px rgba(16,27,45,.05);padding:11px 17px;font-size:14.5px}
.tools-primary .tool-big svg{width:24px;height:24px}
.tools-secondary .tool-big{background:#F6F8FC;padding:8px 13px;font-size:13px;color:var(--text3);font-weight:500}
.tools-secondary .tool-big svg{width:18px;height:18px}

/* skills */
.skill-group{margin-bottom:18px}
.skill-group-name{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px;margin-bottom:10px}
.skill-group-name .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--text2);background:#fff}
.tag.primary{background:rgba(30,92,219,.08);border-color:rgba(30,92,219,.2);color:var(--accent);font-weight:600}

/* certs */
.cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.cert{display:block;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;transition:.18s;cursor:pointer;width:240px}
.cert:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--accent)}
.cert-thumb{width:100%;aspect-ratio:1.4;object-fit:cover;background:#EEF2F9;display:block}
.cert-body{padding:12px 14px}
.cert-name{font-size:13.5px;font-weight:600;line-height:1.3}
.cert-meta{font-size:11.5px;color:var(--text3);margin-top:3px}
.cert-h{display:inline-block;margin-left:7px;padding:1px 7px;border-radius:99px;background:rgba(30,92,219,.09);color:var(--accent);font-size:10.5px;font-weight:700}

/* projects gallery */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}

/* ===== CARROSSEL (projetos e certificados) ===== */
.carousel{position:relative}
/* filtro de projetos por empresa */
.proj-filter{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.proj-filter-btn{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:99px;padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;transition:.15s}
.proj-filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.proj-filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.proj-filter-btn[data-emp]:not([data-emp="all"]).active{background:var(--emp,var(--accent));border-color:var(--emp,var(--accent))}
.pf-logo{width:18px;height:18px;border-radius:5px;background:#fff;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.pf-logo img{max-width:80%;max-height:80%;object-fit:contain}
.proj-filter-btn.active .pf-logo{border-color:rgba(255,255,255,.4)}
.carousel-track{display:flex;gap:16px;overflow-x:auto;scroll-behavior:smooth;scroll-snap-type:x mandatory;padding:4px 2px 14px;-ms-overflow-style:none;scrollbar-width:none}
.carousel-track::-webkit-scrollbar{display:none}
.carousel-track>*{scroll-snap-align:start;flex:0 0 auto}
.carousel-arrow{position:absolute;top:42%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:0 4px 14px rgba(16,27,45,.12);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;transition:.15s}
.carousel-arrow:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.carousel-arrow.prev{left:-12px}
.carousel-arrow.next{right:-12px}
.carousel-arrow svg{width:18px;height:18px}
.carousel-dots{display:flex;justify-content:center;gap:7px;margin-top:6px}
.carousel-dot{width:7px;height:7px;border-radius:50%;background:var(--line);border:none;cursor:pointer;padding:0;transition:.15s}
.carousel-dot.active{background:var(--accent);width:20px;border-radius:4px}
.proj{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#fff;transition:.18s;width:300px;cursor:pointer}
.proj:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.proj:hover .proj-expand-ic{opacity:1;transform:scale(1)}
.proj-count{position:absolute;top:10px;right:10px;display:inline-flex;align-items:center;gap:5px;background:rgba(15,27,45,.78);color:#fff;border-radius:8px;padding:4px 9px;font-size:11.5px;font-weight:700;backdrop-filter:blur(4px)}
.proj-count svg{width:13px;height:13px}
.proj-thumb-wrap{position:relative}
.proj-thumb{width:100%;aspect-ratio:1.6;object-fit:cover;background:linear-gradient(135deg,#EEF2F9,#DCE4F2);display:block}
.proj-expand-ic{position:absolute;bottom:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.96);box-shadow:0 2px 8px rgba(16,27,45,.18);display:flex;align-items:center;justify-content:center;color:var(--emp,var(--accent));opacity:.85;transform:scale(.94);transition:.18s}
.proj-expand-ic svg{width:15px;height:15px}
.proj-emp{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.94);backdrop-filter:blur(4px);border-radius:8px;padding:4px 9px 4px 5px;box-shadow:0 2px 8px rgba(16,27,45,.12)}
.proj-emp-logo{width:18px;height:18px;border-radius:5px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.proj-emp-logo img{max-width:88%;max-height:72%;object-fit:contain}
.proj-emp-name{font-size:10.5px;font-weight:600;color:var(--text2)}
.proj-body{padding:14px 16px}
.proj-title{font-size:15px;font-weight:600}
.proj-desc{font-size:12.5px;color:var(--text3);margin-top:5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* modal de projeto */
.proj-modal{position:fixed;inset:0;background:rgba(15,27,45,.82);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:120;padding:28px}
.proj-modal.open{display:flex;animation:pmFade .2s ease}
@keyframes pmFade{from{opacity:0}to{opacity:1}}
.pm-box{position:relative;background:var(--card);border-radius:18px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.4);animation:pmRise .25s cubic-bezier(.2,.8,.3,1)}
@keyframes pmRise{from{transform:translateY(16px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.pm-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,.92);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:2;transition:.15s}
.pm-close:hover{background:#fff;transform:scale(1.06)}
.pm-close svg{width:17px;height:17px}
.pm-img-wrap{width:100%;aspect-ratio:1.7;overflow:hidden;border-radius:18px 18px 0 0;background:linear-gradient(135deg,#EEF2F9,#DCE4F2)}
.pm-gallery{position:relative}
.pm-nav{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 12px;pointer-events:none}
.pm-arrow{pointer-events:auto;width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.92);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.2);transition:.15s}
.pm-arrow:hover{background:#fff;transform:scale(1.08)}
.pm-arrow svg{width:18px;height:18px}
.pm-dots{display:flex;justify-content:center;gap:7px;padding:12px 0 0}
.pm-dot{width:8px;height:8px;border-radius:50%;border:none;background:var(--line);cursor:pointer;padding:0;transition:.15s}
.pm-dot.active{background:var(--emp,var(--accent));width:22px;border-radius:99px}
.pm-img{width:100%;height:100%;object-fit:cover;display:block}
.pm-img-empty{min-height:180px}
.pm-body{padding:22px 26px 26px}
.pm-eyebrow{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--emp,var(--accent))}
.pm-title{font-size:21px;font-weight:700;letter-spacing:-.4px;margin:6px 0 14px;color:var(--ink);line-height:1.25}
.pm-emp-slot:not(:empty){margin-bottom:16px}
.pm-emp{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--bg)}
.pm-emp-logo{width:38px;height:38px;border-radius:9px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.pm-emp-logo img{max-width:80%;max-height:70%;object-fit:contain}
.pm-emp-name{display:block;font-size:14px;font-weight:600;color:var(--ink)}
.pm-emp-role{display:block;font-size:12px;color:var(--text3);margin-top:1px}
.pm-desc{font-size:14px;line-height:1.65;color:var(--text2);margin:0;text-align:justify}

/* idiomas / formacao */
.lang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.lang-card{border:1px solid var(--line);border-radius:12px;padding:14px}
.lang-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.lang-flag{font-size:22px}
.lang-name{font-weight:600;font-size:14px}
.lang-level{font-size:11.5px;color:var(--text3)}
.lang-bar{display:flex;gap:5px}
.lang-dot{flex:1;height:5px;border-radius:3px;background:var(--line)}
.lang-dot.on{background:var(--accent)}
.edu-card{display:flex;gap:14px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:16px}
.edu-card + .edu-card{margin-top:11px}
.edu-info{flex:1;min-width:0}
.edu-logo{width:54px;height:54px;border-radius:11px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;color:var(--accent)}
.edu-logo img{max-width:80%;max-height:62%;object-fit:contain}
.edu-type{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);margin-bottom:2px}
.edu-title{font-weight:600;font-size:15px}
.edu-meta{font-size:12.5px;color:var(--text3);margin-top:2px}
.edu-crea{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 10px;border-radius:8px;background:rgba(34,197,94,.1);color:#15803D;font-size:11.5px;font-weight:700}
.edu-crea svg{width:13px;height:13px}
.edu-status{font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:4px 10px;border-radius:99px;flex-shrink:0}
.edu-status-done{background:rgba(34,197,94,.12);color:#15803D}
.edu-status-soon{background:rgba(30,92,219,.1);color:var(--accent)}

/* about / values */
.about p{color:var(--text2);font-size:14.5px;margin-bottom:12px}
.values-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

/* Soft Skills acolhedor */
.soft-intro{font-size:14.5px;color:var(--text2);line-height:1.6;margin:0 0 20px;max-width:640px}
.soft-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.soft-item{display:flex;gap:15px;align-items:flex-start;padding:18px 18px;border-radius:16px;background:color-mix(in srgb,var(--sc) 5%,#fff);border:1px solid color-mix(in srgb,var(--sc) 14%,transparent);transition:.2s}
.soft-item:hover{transform:translateY(-2px);background:color-mix(in srgb,var(--sc) 9%,#fff);box-shadow:0 8px 22px color-mix(in srgb,var(--sc) 14%,transparent)}
.soft-ico{width:50px;height:50px;flex-shrink:0;border-radius:14px;background:color-mix(in srgb,var(--sc) 14%,#fff);color:var(--sc);display:flex;align-items:center;justify-content:center}
.soft-txt{min-width:0}
.soft-title{font-weight:700;font-size:15.5px;color:var(--ink);margin-bottom:4px}
.soft-desc{font-size:13px;color:var(--text2);line-height:1.55}
.value{border:1px solid var(--line);border-radius:12px;padding:18px}
.value-ico{width:40px;height:40px;border-radius:10px;background:rgba(30,92,219,.08);color:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:11px}
.value-title{font-weight:600;font-size:15px;margin-bottom:5px}
.value-desc{font-size:13px;color:var(--text3)}
.awards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px}
.award{display:flex;gap:13px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:15px}
.award-ico{width:44px;height:44px;border-radius:11px;background:rgba(245,158,11,.12);color:#D97706;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.award-title{font-weight:600;font-size:14px}
.award-sub{font-size:12px;color:var(--text3)}

/* competências como chips compactos */
.comp-chips{display:flex;flex-wrap:wrap;gap:8px}
/* competências como cards temáticos por área */
.comp-intro{font-size:14.5px;color:var(--text2);line-height:1.6;margin:0 0 20px;max-width:640px}
.area-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.area-card{border:1px solid var(--line);border-left:3px solid var(--ac);border-radius:13px;padding:17px 18px;transition:.2s;background:#fff}
.area-card:hover{box-shadow:0 8px 22px color-mix(in srgb,var(--ac) 12%,transparent);transform:translateY(-2px)}
.area-card.has-more{cursor:pointer}
.area-card.expanded{box-shadow:0 8px 22px color-mix(in srgb,var(--ac) 13%,transparent)}
.area-head{display:flex;align-items:center;gap:11px;margin-bottom:13px}
.area-ico{width:40px;height:40px;border-radius:11px;background:color-mix(in srgb,var(--ac) 12%,#fff);color:var(--ac);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.area-name{font-size:15px;font-weight:700;color:var(--ink);line-height:1.2}
.area-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.area-tag{font-size:12px;font-weight:600;color:var(--ac);background:color-mix(in srgb,var(--ac) 8%,#fff);border:1px solid color-mix(in srgb,var(--ac) 18%,transparent);border-radius:99px;padding:4px 11px}
.area-tag:not(.key){color:var(--text2);background:#F6F8FC;border-color:var(--line);font-weight:500}
.area-tag-extra{display:none}
.area-card.expanded .area-tag-extra{display:inline-flex}
.area-count{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.area-more{display:inline-flex;align-items:center;gap:5px;border:none;background:transparent;padding:0;font-size:12px;font-weight:700;color:var(--ac);cursor:pointer;font-family:inherit}
.area-more-n{font-size:11px;background:color-mix(in srgb,var(--ac) 12%,#fff);border-radius:99px;padding:1px 8px}
.area-card.expanded .area-more-n{display:none}
.tools-count{font-weight:600;color:var(--accent);text-transform:none;letter-spacing:0}
/* níveis de ferramenta como sub-cards */
.tool-level{border-radius:14px;padding:16px 18px;margin-top:14px}
.tool-level:first-of-type{margin-top:6px}
.tool-level-primary{background:linear-gradient(135deg,rgba(30,92,219,.05),transparent);border:1px solid rgba(30,92,219,.16)}
.tool-level-secondary{background:var(--bg);border:1px solid var(--line)}
.tool-level-head{display:flex;align-items:center;gap:9px;margin-bottom:13px}
.tool-level-name{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text2)}
.tool-level-primary .tool-level-name{color:var(--accent)}
.tool-level-count{font-size:11px;font-weight:700;min-width:22px;height:22px;padding:0 7px;border-radius:99px;display:inline-flex;align-items:center;justify-content:center;background:color-mix(in srgb,var(--accent) 12%,#fff);color:var(--accent)}
.tool-level-secondary .tool-level-count{background:#E7ECF3;color:var(--text3)}
.comp-extra{display:none}
.skill-group{margin-top:18px}
.skill-group:first-of-type{margin-top:4px}
.skill-group-title{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.comp-chip{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:99px;padding:7px 14px;font-size:12.5px;font-weight:500;color:var(--text2);background:#fff}
.comp-chip.primary{background:rgba(30,92,219,.08);border-color:rgba(30,92,219,.22);color:var(--accent);font-weight:600}

/* linha de dois cards lado a lado (formação + idiomas) */
.card-row{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-bottom:22px}
.card-row .card-half{margin-bottom:0}
@media(max-width:760px){.card-row{grid-template-columns:1fr}}

/* reconhecimentos (faixa no topo de Projetos) */
.recon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px}
.recon-card{display:flex;gap:13px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:linear-gradient(135deg,rgba(245,158,11,.05),transparent)}
.recon-ico{width:42px;height:42px;border-radius:11px;background:rgba(245,158,11,.13);color:#D97706;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.recon-title{font-weight:600;font-size:14px}
.recon-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(15,27,45,.88);display:none;align-items:center;justify-content:center;z-index:100;padding:30px;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:92%;max-height:92%;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.5)}

/* mobile */
.mobile-bar{display:none}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;width:280px}
  .sidebar.open{transform:none}
  .main{margin-left:0;padding:78px 18px 60px}
  .mobile-bar{display:flex;align-items:center;gap:12px;position:fixed;top:0;left:0;right:0;height:60px;background:var(--ink);color:#fff;padding:0 16px;z-index:50}
  .mb-burger{background:none;border:none;color:#fff;cursor:pointer;padding:6px}
  .mb-photo{width:36px;height:36px;border-radius:9px;object-fit:cover}
  .mb-name{font-weight:700;font-size:14px}
  .mb-role{font-size:10px;color:#8FA0C0;text-transform:uppercase;letter-spacing:.5px}
  .hero{flex-direction:column;padding:22px}
  .hero-photo{width:120px;height:120px}
  .company-head{grid-template-columns:auto 1fr auto;gap:12px}
  .dests{display:none}
  .page-title{font-size:26px}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:45;display:none}
  .scrim.open{display:block}
}
@media(min-width:901px){.scrim{display:none}}

/* ===== PÁGINA DE IMPRESSÃO RESUMIDA (escondida na tela) ===== */
.print-doc{display:none}
#printResumo{background:var(--ink);color:#fff;padding:34px 38px;font-size:11px}
.pr-header{display:flex;gap:20px;align-items:center;margin-bottom:18px}
.pr-photo{width:96px;height:96px;border-radius:16px;object-fit:cover;border:2px solid rgba(255,255,255,.15)}
.pr-eyebrow{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#5BB4FF}
.pr-name{font-size:30px;font-weight:700;letter-spacing:-1px;margin:3px 0}
.pr-fullname{font-size:10px;color:#7C8BA8;font-weight:500;margin-bottom:4px}
.pr-role{font-size:13px;color:#B8C4DC;font-weight:500}
.pr-contact{display:flex;flex-wrap:wrap;gap:14px;margin-top:9px;font-size:10.5px;color:#9FB0CF}
.pr-summary{background:rgba(255,255,255,.05);border-left:3px solid #5BB4FF;border-radius:0 8px 8px 0;padding:12px 15px;font-size:11px;line-height:1.55;color:#D6DEEC;margin-bottom:16px}
.pr-impact-block{margin-bottom:18px}
.pr-impact{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:0}
.pr-imp{background:rgba(255,255,255,.06);border-radius:10px;padding:11px 13px}
.pr-imp-val{font-size:21px;font-weight:700;letter-spacing:-.5px;color:#fff}
.pr-imp-val span{font-size:11px;color:#5BB4FF;margin-left:2px}
.pr-imp-lbl{font-size:9.5px;color:#9FB0CF;margin-top:2px}
.pr-cols{display:grid;grid-template-columns:1.7fr 1fr;gap:24px}
.pr-sec-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#5BB4FF;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.12)}
.pr-exp{display:flex;gap:11px;margin-bottom:13px}
.pr-exp-logo{width:38px;height:38px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.pr-exp-logo img{max-width:78%;max-height:62%;object-fit:contain}
.pr-exp-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.pr-exp-name{font-weight:700;font-size:13px;color:#fff}
.pr-exp-period{font-size:9.5px;color:#8FA0C0;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.pr-exp-role{font-size:10.5px;color:#B8C4DC;margin:1px 0 3px}
.pr-exp-resumo{font-size:10px;color:#9FB0CF;line-height:1.45}
.pr-exp-deliv{font-size:9.5px;color:#7FE0C0;line-height:1.4;margin-top:3px}
.pr-exp-deliv strong{color:#A8EED8;font-weight:600}
.pr-skill{display:flex;flex-direction:column;margin-bottom:8px}
.pr-skill-g{font-size:10.5px;font-weight:600;color:#fff}
.pr-skill-t{font-size:9.5px;color:#9FB0CF;line-height:1.4}
.pr-langs{display:flex;flex-direction:column;gap:4px;font-size:10px;color:#B8C4DC}
.pr-edu{font-size:11px;font-weight:600;color:#fff}
.pr-edu span{font-size:9.5px;font-weight:400;color:#9FB0CF}

/* ===== DOCUMENTO COMPLETO (claro, multipágina) ===== */
#printCompleto{color:var(--text);font-size:12px;background:#fff}
.pc-page{padding:28px 38px;box-sizing:border-box;min-height:297mm;page-break-after:always;position:relative;display:flex;flex-direction:column}
.pc-cover{display:block}
.pc-page:last-child{page-break-after:auto}
.pc-sec{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:9px;padding-bottom:5px;border-bottom:2px solid var(--accent)}
.pc-sec-lg{font-size:13px}
.pc-sub{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin:13px 0 8px}
/* página 1 — capa */
.pc-cover-head{display:flex;gap:20px;align-items:center;margin-bottom:14px}
.pc-photo{width:88px;height:88px;border-radius:16px;object-fit:cover;border:1px solid var(--line)}
.pc-eyebrow{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent)}
.pc-name{font-size:32px;font-weight:700;letter-spacing:-1.2px;margin:3px 0}
.pc-fullname{font-size:11px;color:var(--text3);font-weight:500;margin:2px 0 0}
.pc-role{font-size:15px;color:var(--text2);font-weight:500}
.pc-contact{display:flex;flex-wrap:wrap;gap:8px 18px;font-size:11.5px;color:var(--text2);padding:10px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:14px}
.pc-ct{display:inline-flex;align-items:center;gap:7px}
.pc-ct-ic{display:inline-flex;width:14px;height:14px;color:var(--accent)}
.pc-ct-ic svg{width:14px;height:14px}
.pc-summary{font-size:11.5px;line-height:1.55;color:var(--text);margin-bottom:14px}
.pc-impact{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px}
.pc-imp{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 13px}
.pc-imp-val{font-size:22px;font-weight:700;color:var(--accent);letter-spacing:-.5px;line-height:1}
.pc-imp-val span{font-size:12px;margin-left:2px;color:var(--accent)}
.pc-imp-lbl{font-size:11px;font-weight:600;color:var(--ink);margin-top:5px}
.pc-imp-sub{font-size:9.5px;color:var(--text2);line-height:1.4;margin-top:2px}
.pc-summary strong{color:var(--ink);font-weight:600}
.pc-grid2{display:grid;grid-template-columns:1fr 1fr;gap:28px}
.pc-grid2-tight{gap:20px}
.pc-edu-t{font-size:14px;font-weight:600;color:var(--ink)}
.pc-edu-m{font-size:12px;color:var(--text2);margin-top:2px}
.pc-langs{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.pc-lang{display:flex;align-items:center;gap:7px;font-size:11.5px}
.pc-lang-flag{font-size:14px}
.pc-lang-name{font-weight:600;color:var(--ink);min-width:64px}
.pc-lang-lvl{color:var(--text2);font-size:10.5px}
/* página 2 — skills */
.pc-skills{display:grid;grid-template-columns:1fr 1fr;gap:11px 26px}
.pc-skill-g{font-size:11.5px;font-weight:700;color:var(--ink);margin-bottom:5px}
.pc-skill-tags{display:flex;flex-wrap:wrap;gap:5px}
.pc-skill-tags span{font-size:10px;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:2px 8px;color:var(--text2)}
.pc-vals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px 20px}
.pc-val-t{font-size:11.5px;font-weight:700;color:var(--ink);margin-bottom:3px}
.pc-val-d{font-size:10px;color:var(--text2);line-height:1.45}
/* páginas de empresa */
.pc-emp-head{display:flex;gap:15px;align-items:center;padding-bottom:14px;border-bottom:2px solid var(--emp,var(--accent));margin-bottom:16px}
.pc-emp-logo{width:54px;height:54px;border-radius:12px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.pc-emp-logo img{max-width:76%;max-height:62%;object-fit:contain}
.pc-emp-name{font-size:20px;font-weight:700;color:var(--ink)}
.pc-emp-extra{font-size:14px;font-weight:500;color:var(--text2)}
.pc-badge{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:var(--emp,var(--accent));color:#fff;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle}
.pc-emp-role{font-size:13px;color:var(--text2);font-weight:500;margin-top:2px}
.pc-emp-period{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px}
.pc-emp-resumo{font-size:12.5px;line-height:1.6;color:var(--text);margin-bottom:6px}
.pc-emp-resumo strong{color:var(--ink);font-weight:600}
.pc-deliv{margin:0 0 14px;padding-left:0;list-style:none}
.pc-deliv li{font-size:12px;line-height:1.5;color:var(--text);padding-left:16px;position:relative;margin-bottom:6px}
.pc-deliv li::before{content:"›";position:absolute;left:0;color:var(--emp,var(--accent));font-weight:700}
.pc-deliv strong{color:var(--ink);font-weight:600}
.pc-emp-tools{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.pc-chip{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;border:1px solid var(--line);border-radius:7px;padding:4px 9px;color:var(--text2)}
.pc-chip span{display:inline-flex;align-items:center}
/* projeto embaixo */
.pc-proj{margin-top:auto;padding-top:16px;border-top:1px dashed var(--line)}
.pc-proj-label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.pc-proj-list{display:flex;flex-direction:column;gap:10px}
.pc-proj-card{display:flex;gap:14px;background:var(--bg);border:1px solid var(--line);border-radius:10px;overflow:hidden;break-inside:avoid}
.pc-proj-img{width:150px;flex-shrink:0;aspect-ratio:1.6;object-fit:cover;background:linear-gradient(135deg,#EEF2F9,#DCE4F2)}
.pc-proj-body{padding:11px 14px}
.pc-proj-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:4px}
.pc-proj-desc{font-size:11px;line-height:1.5;color:var(--text2)}

/* ===== IMPRESSÃO ===== */
@media print{
  @page{size:A4;margin:0}
  body{background:#fff}
  *{animation:none!important;opacity:1!important}
  .sidebar,.mobile-bar,.scrim,.modal,.lightbox{display:none!important}

  /* MODO RESUMIDO: só a página executiva, 1 folha */
  body.print-resumo .app{display:none!important}
  body.print-resumo #printResumo{display:block!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  /* o doc escuro preenche a folha A4 inteira (sem tarja branca no fim) */
  body.print-resumo{background:var(--ink)!important}
  body.print-resumo #printResumo{min-height:297mm;padding:26px 32px!important;box-sizing:border-box}
  body.print-resumo .pr-header{margin-bottom:14px!important}
  body.print-resumo .pr-summary{margin-bottom:12px!important;padding:10px 13px!important}
  body.print-resumo .pr-impact-block{margin-bottom:13px!important}
  body.print-resumo .pr-exp{margin-bottom:10px!important}
  body.print-resumo .pr-fit{break-inside:avoid}

  /* MODO COMPLETO: só o documento dedicado #printCompleto */
  body.print-completo .app{display:none!important}
  body.print-completo #printResumo{display:none!important}
  body.print-completo #printCompleto{display:block!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>

/* traduz meses abreviados e "Atual" dentro de um período conforme idioma atual */
const MONTHS_I18N = {
  en:{Jan:'Jan',Fev:'Feb',Mar:'Mar',Abr:'Apr',Mai:'May',Jun:'Jun',Jul:'Jul',Ago:'Aug',Set:'Sep',Out:'Oct',Nov:'Nov',Dez:'Dec'},
  es:{Jan:'Ene',Fev:'Feb',Mar:'Mar',Abr:'Abr',Mai:'May',Jun:'Jun',Jul:'Jul',Ago:'Ago',Set:'Sep',Out:'Oct',Nov:'Nov',Dez:'Dic'}
};
const ATUAL_I18N = {en:'Present', es:'Actual'};
function trPeriodo(str, lang){
  lang = lang || CURRENT_LANG;
  if(!str || lang==='pt') return str;
  let out = str;
  const mm = MONTHS_I18N[lang];
  if(mm){ out = out.replace(/\b(Jan|Fev|Mar|Abr|Mai|Jun|Jul|Ago|Set|Out|Nov|Dez)\b/g, m=>mm[m]||m); }
  out = out.replace(/\bAtual\b/g, ATUAL_I18N[lang]||'Atual');
  // traduz unidades de tempo de casa ("X anos Y meses")
  const U = lang==='en'?{anos:'years',ano:'year',meses:'months','mês':'month','mes':'month'}
          : lang==='es'?{anos:'años',ano:'año',meses:'meses','mês':'mes','mes':'mes'}
          : null;
  if(U){
    out = out.replace(/\banos\b/g,U.anos).replace(/\bano\b/g,U.ano)
             .replace(/\bmeses\b/g,U.meses).replace(/\bmês\b/g,U['mês']);
  }
  return out;
}

/* calcula duração "X anos Y meses" a partir de "Mes/AAAA" até hoje (empresas atuais) */
function tempoDecorrido(periodo){
  const meses={jan:0,fev:1,mar:2,abr:3,mai:4,jun:5,jul:6,ago:7,set:8,out:9,nov:10,dez:11};
  const m=periodo.match(/([a-zç]{3})\/(\d{4})/i);
  if(!m) return '';
  const mi=meses[m[1].toLowerCase()]; if(mi===undefined) return '';
  const ini=new Date(+m[2],mi,1), hoje=new Date();
  let tot=(hoje.getFullYear()-ini.getFullYear())*12+(hoje.getMonth()-ini.getMonth());
  if(tot<0) tot=0;
  const a=Math.floor(tot/12), mm=tot%12, p=[];
  const L=CURRENT_LANG;
  const U = L==='en'?{a1:'year',aN:'years',m1:'month',mN:'months'}
          : L==='es'?{a1:'año',aN:'años',m1:'mes',mN:'meses'}
          : {a1:'ano',aN:'anos',m1:'mês',mN:'meses'};
  if(a>0) p.push(a+' '+(a===1?U.a1:U.aN));
  if(mm>0) p.push(mm+' '+(mm===1?U.m1:U.mN));
  return p.join(' ')||('1 '+U.m1);
}

function toggleAllCompanies(btn){

/* scroll suave ao topo do conteúdo principal */

  const main=document.getElementById('main')||document.scrollingElement;

/* logo de ferramenta por nome (case-insensitive, com fallback) */
function toolLogo(name){
  const low = name.toLowerCase();
  let key = null;
  for(const [g,items] of CONFIG.ferramentas){
    const f = items.find(([n])=>n.toLowerCase()===low);
    if(f){ key=f[1]; break; }
  }
  return key&&TOOL_LOGOS[key]?`<span style="width:17px;height:17px;display:inline-block">${TOOL_LOGOS[key]}</span>`:'';
}

  pmRenderImg();
  // setas só se houver mais de 1
  modal.querySelector('.pm-nav').style.display = n>1?'flex':'none';
  modal.querySelector('.pm-dots').innerHTML = n>1
    ? PM_STATE.imgs.map((_,i)=>`<button class="pm-dot${i===0?' active':''}" onclick="pmGoto(${i})"></button>`).join('') : '';
  const empHTML = emp?`<div class="pm-emp"><span class="pm-emp-logo"><img src="${emp.logo}" alt="${emp.nome}"></span><div><span class="pm-emp-name">${emp.nome}</span>${emp.cargo?`<span class="pm-emp-role">${tr(emp.cargo,lang)}</span>`:''}</div></div>`:'';
  modal.querySelector('.pm-eyebrow').textContent = tr('Projeto',lang);
  modal.querySelector('.pm-title').textContent = tr(p.title,lang);
  modal.querySelector('.pm-emp-slot').innerHTML = empHTML;
  modal.querySelector('.pm-desc').textContent = tr(det,lang);
  modal.classList.add('open');
  document.body.style.overflow='hidden';
}
function pmRenderImg(){
  const modal=document.getElementById('proj-modal');
  const src=PM_STATE.imgs[PM_STATE.cur]||'';
  modal.querySelector('.pm-img-wrap').innerHTML =
    `<img class="pm-img" src="${src}" alt="" onerror="this.style.background='linear-gradient(135deg,#EEF2F9,#DCE4F2)';this.classList.add('pm-img-empty');this.removeAttribute('src')">`;
  modal.querySelectorAll('.pm-dot').forEach((d,i)=>d.classList.toggle('active', i===PM_STATE.cur));
}
function pmGoto(i){ const n=PM_STATE.imgs.length; PM_STATE.cur=(i+n)%n; pmRenderImg(); }
function pmNext(){ pmGoto(PM_STATE.cur+1); }
function pmPrev(){ pmGoto(PM_STATE.cur-1); }

/* filtra os cards de projeto por empresa (ou 'all') */
function filterProjetos(empKey, btn){
  const track=document.getElementById('car-proj');
  if(!track) return;
  track.querySelectorAll('.proj').forEach(c=>{
    const show = empKey==='all' || c.dataset.emp===empKey;
    c.style.display = show?'':'none';

/* tradução pontual para o print: usa o mesmo dict do i18n, com fallback PT.
   Funciona com strings cruas do CONFIG (sem data-i18n no print-doc). */
function tr(s, lang){
  if(!s || lang==='pt') return s;
  const dict = I18N[lang];
  if(!dict) return s;
  return dict[i18nNorm(s)] || dict[s] || s;
}

/* ---------- CARROSSEL ---------- */
function carScroll(id, dir){
  const t = document.getElementById('car-'+id);
  if(!t) return;
  const card = t.querySelector('*');
  const step = card ? card.getBoundingClientRect().width + 16 : 300;
  t.scrollBy({left: dir*step*Math.max(1, Math.floor(t.clientWidth/step)-1 || 1), behavior:'smooth'});
}
function carUpdateDots(id){
  const t = document.getElementById('car-'+id);
  const dotsBox = document.getElementById('dots-'+id);
  if(!t||!dotsBox) return;
  const visibles = Array.from(t.children).filter(c=>c.style.display!=='none');
  const card = visibles[0] || t.querySelector('*');
  if(!card){ dotsBox.innerHTML=''; return; }
  const step = card.getBoundingClientRect().width + 16;
  const perView = Math.max(1, Math.round(t.clientWidth/step));
  const pages = Math.max(1, Math.ceil(visibles.length/perView));
  const current = Math.round(t.scrollLeft/(step*perView));
  // (re)cria dots se a quantidade mudou
  if(dotsBox.children.length !== pages){
    dotsBox.innerHTML = Array.from({length:pages},(_,i)=>`<button class="carousel-dot${i===0?' active':''}" onclick="carGoto('${id}',${i})"></button>`).join('');
  }
  Array.from(dotsBox.children).forEach((d,i)=>d.classList.toggle('active', i===current));
}
function carGoto(id, page){
  const t = document.getElementById('car-'+id);
  const card = t&&t.querySelector('*');
  if(!card) return;
  const step = card.getBoundingClientRect().width + 16;
  const perView = Math.max(1, Math.round(t.clientWidth/step));
  t.scrollTo({left: page*step*perView, behavior:'smooth'});
}
function initCarousels(){ ['proj','certs'].forEach(id=>{ if(document.getElementById('car-'+id)) carUpdateDots(id); }); }

/* ---------- PDF ---------- */
function openPdf(){ $('#pdfModal').classList.add('open'); }

// RESUMIDO: 1 página executiva (#printResumo)
function printResumo(){
  closePdf();
  rebuildPrintResumo();              // garante idioma atual
  fitPrintResumo();                  // corte leve + scale para caber em 1 A4
  document.body.classList.add('print-resumo');
  window.scrollTo(0,0);
  setTimeout(()=>{ window.print(); setTimeout(()=>document.body.classList.remove('print-resumo'),400); }, 150);
}
/* mede a altura real do conteúdo e aplica um scale leve no .pr-fit
   para garantir que tudo caiba em uma folha A4 (297mm). */
function fitPrintResumo(){
  const doc = document.getElementById('printResumo');
  const fit = doc && doc.querySelector('.pr-fit');
  if(!fit) return;
  fit.style.transform = '';          // reset antes de medir
  // A4 útil em px @96dpi ≈ 1123px de altura; desconta o padding do #printResumo
  const A4 = 1123;
  // torna mensurável fora do fluxo de impressão
  const prev = doc.style.cssText;
  doc.style.cssText += ';display:block;position:absolute;left:-9999px;top:0;width:794px;';
  const h = fit.scrollHeight + 76;   // + padding vertical aprox. do #printResumo
  doc.style.cssText = prev;
  if(h > A4){
    const scale = Math.max(0.82, A4 / h);   // nunca encolhe demais
    fit.style.transformOrigin = 'top center';
    fit.style.transform = `scale(${scale})`;
  }
}
// COMPLETO: todas as páginas, empresas expandidas
function printCompleto(){
  closePdf();
  rebuildPrintCompleto();           // gera o doc no idioma atual
  document.body.classList.add('print-completo');
  window.scrollTo(0,0);
  setTimeout(()=>{ window.print(); setTimeout(()=>document.body.classList.remove('print-completo'),400); }, 150);
}
/* recria o #printCompleto no idioma corrente */
function rebuildPrintCompleto(){
  const el = document.getElementById('printCompleto');
  if(el) el.remove();
  document.body.insertAdjacentHTML('beforeend', printCompletoHTML(CURRENT_LANG));
}

/* ---------- I18N ---------- */
let SNAP=null;
let CURRENT_LANG='pt';
function i18nNorm(s){ return s.replace(/\s+/g,' ').trim(); }
function snapshot(){
  if(SNAP) return;
  SNAP=[];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    SNAP.push({el, pt: el.innerHTML, norm: i18nNorm(el.innerHTML)});
  });
}
function toggleLangDD(e){
  e.stopPropagation();
  $('#langDD').classList.toggle('open');
}
document.addEventListener('click', ()=>{ const d=$('#langDD'); if(d) d.classList.remove('open'); });

function setLang(lang){
  snapshot();
  CURRENT_LANG = lang;
  // atualiza dropdown: botão atual + check
  const meta = LANGS.find(l=>l.code===lang) || LANGS[0];
  $('#lc-flag').textContent = meta.flag;
  $('#lc-name').textContent = meta.name;
  document.querySelectorAll('.lang-opt').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
  $('#langDD').classList.remove('open');
  // aplica tradução
  const dict = lang==='pt'?null:I18N[lang];
  SNAP.forEach(({el,pt,norm})=>{
    if(!dict){ el.innerHTML=pt; return; }
    el.innerHTML = dict[norm] || dict[i18nNorm(pt)] || pt;
  });
  document.documentElement.lang = lang==='pt'?'pt-BR':lang;
  // re-traduz períodos (meses, "Atual", tempo de casa) que não usam data-i18n
  document.querySelectorAll('.nav-emp-period[data-period], .traj-period[data-period]').forEach(el=>{
    el.textContent = trPeriodo(el.dataset.period, lang);
  });
  document.querySelectorAll('.company-period[data-period]').forEach(el=>{
    if(el.dataset.current){ el.textContent = `${trPeriodo(el.dataset.period, lang)} · ${tempoDecorrido(el.dataset.period)}`; }
    else { el.textContent = trPeriodo(el.dataset.periodofull, lang); }
  });
  // regenera os print-docs no idioma atual
  rebuildPrintResumo();
  if(document.getElementById('printCompleto')) rebuildPrintCompleto();
}

/* recria o #printResumo no idioma corrente (chamado no init e a cada setLang) */
function rebuildPrintResumo(){
  const pr = document.getElementById('printResumo');
  if(pr) pr.remove();
  document.body.insertAdjacentHTML('beforeend', printResumoHTML(CURRENT_LANG));
}
